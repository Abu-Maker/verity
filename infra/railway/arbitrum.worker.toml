# ============================================================
# Verity — Arbitrum Scanner Worker
# ============================================================

[build]
builder = "nixpacks"
buildCommand = "pnpm install"

[deploy]
startCommand = "npx ts-node packages/scanner/worker.ts"
restartPolicyType = "always"
restartPolicyMaxRetries = 10

[env]
CHAIN_ID = "42161"
POLL_INTERVAL = "500"
BATCH_SIZE = "10"